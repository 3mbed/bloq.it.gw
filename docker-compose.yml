version: "3.9"

volumes:
  logs:

services:

  # ── Container A: C/C++ QR serial driver + socat sidecar ─────────────────
  # NB: socat runs INSIDE this container (not a separate service) so the
  # PTY device nodes live in the same /dev/pts namespace as the C reader.
  qr-c:
    build:
      context: ./qr-c
      dockerfile: Dockerfile
    image: bloqit/qr-c:latest
    restart: unless-stopped
    environment:
      SERIAL_PORT: /tmp/ttyS1
      BAUD_RATE: "115200"
      SOCK_PATH: /tmp/qr.sock
      READ_TIMEOUT: "10"
    volumes:
      - /tmp:/tmp
      - logs:/var/log/bloqit
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/qr.sock"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Container B: Python MQTT gateway ────────────────────────────────────
  gateway-py:
    build:
      context: ./gateway-py
      dockerfile: Dockerfile
    image: bloqit/gateway-py:latest
    restart: unless-stopped
    environment:
      MQTT_HOST: test.mosquitto.org
      MQTT_PORT: "8883"
      MQTT_CERT: /certs/mosquitto.org.crt
      MQTT_TOPIC_CMD: from_cloud/command
      MQTT_TOPIC_EVENT: from_device/events
      SOCK_PATH: /tmp/qr.sock
      RECONNECT_DELAY: "5"
    volumes:
      - /tmp:/tmp
      - logs:/var/log/bloqit
      # optional: mount your own CA cert
      # - ./certs/mosquitto.org.crt:/certs/mosquitto.org.crt:ro
    depends_on:
      qr-c:
        condition: service_healthy
