version: "3.9"

volumes:
  logs:

services:

  # ── Local MQTT broker ───────────────────────────────────────────────────
  # Replaces test.mosquitto.org so the gateway has a deterministic,
  # rate-limit-free broker on the compose network. Plain MQTT on 1883;
  # TLS is unnecessary inside the bridge network.
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # Host:container — host side uses 11883 to avoid clashing with a
      # system-installed mosquitto or leftover container on 1883.
      # The gateway talks to the broker on 1883 inside the compose network.
      - "11883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      # mosquitto_sub returns once it gets the SUBACK — proves the broker
      # is accepting connections end-to-end.
      test: ["CMD", "sh", "-c", "mosquitto_sub -h localhost -t healthcheck -C 1 -W 2 || true"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s

  # ── Container A: C/C++ QR serial driver + socat sidecar ─────────────────
  # NB: socat runs INSIDE this container (not a separate service) so the
  # PTY device nodes live in the same /dev/pts namespace as the C reader.
  qr-c:
    build:
      context: ./qr-c
      dockerfile: Dockerfile
    image: bloqit/qr-c:latest
    restart: unless-stopped
    environment:
      SERIAL_PORT: /tmp/ttyS1
      BAUD_RATE: "115200"
      SOCK_PATH: /tmp/qr.sock
      READ_TIMEOUT: "10"
    volumes:
      - /tmp:/tmp
      - logs:/var/log/bloqit
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/qr.sock"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Container B: Python MQTT gateway ────────────────────────────────────
  gateway-py:
    build:
      context: ./gateway-py
      dockerfile: Dockerfile
    image: bloqit/gateway-py:latest
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USE_TLS: "false"
      MQTT_TOPIC_CMD: from_cloud/command
      MQTT_TOPIC_EVENT: from_device/events
      SOCK_PATH: /tmp/qr.sock
      RECONNECT_DELAY: "5"
    volumes:
      - /tmp:/tmp
      - logs:/var/log/bloqit
    depends_on:
      qr-c:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
