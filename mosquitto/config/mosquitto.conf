# Local broker for the bloq.it gateway dev/test setup.
# Listens on 1883 (plain MQTT) — TLS is unnecessary inside the
# compose network. Add a TLS listener on 8883 here later if you want
# to exercise the spec's encrypted path against a local broker.

listener 1883 0.0.0.0
allow_anonymous true

persistence false
log_dest stdout
# Suppress notice/information to hide health-check probe connect/disconnect
# noise (auto-* clients from 127.0.0.1 every 5 s). Keep error and warning
# so real broker problems are still visible.
log_type error
log_type warning
